<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Birthday Mosaic</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>

  <style>
    html, body { height:100%; margin:0; background:#0b0b0f; }
    #osd { width:100%; height:100%; }

    /* Hotspot visuals */
    .hs-wrap{
      position: relative;
      overflow: visible;
      pointer-events:auto;
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.7));
    }
    .hs-hit{
      position:absolute;
      inset:-18px;
      background:transparent;
      cursor:pointer;
      pointer-events:auto;
    }
    .hs-dot{
      position:absolute;
      left:50%; top:50%;
      width:12px; height:12px;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background: rgba(255,255,255,0.5); /* 50% transparent white */
      backdrop-filter: blur(3px);
      box-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 22px rgba(255,255,255,0.5);
      outline: 1px solid rgba(255,255,255,0.6);
      outline-offset: 2px;
      pointer-events:none;
    }
    .hs-halo{
      position:absolute;
      left:50%; top:50%;
      width:60px; height:60px;
      transform:translate(-50%,-50%);
      border-radius:999px;
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow:
        0 0 20px rgba(255,255,255,0.9),
        0 0 40px rgba(255,255,255,0.6);
      animation: haloBright 1.8s ease-out infinite;
      pointer-events:none;
    }
    @keyframes haloBright{
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.6); }
      15%  { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(1.4); }
    }

    /* ===== Artistic Hotspots (warm gold) ===== */
    .hs-art .hs-dot{
      background: rgba(255, 215, 160, 0.6);
      box-shadow:
        0 0 14px rgba(255, 200, 140, 0.9),
        0 0 30px rgba(255, 180, 120, 0.5);
      outline: 1px solid rgba(255, 215, 160, 0.7);
    }
    .hs-art .hs-halo{
      border: 1px solid rgba(255, 210, 150, 0.9);
      box-shadow:
        0 0 30px rgba(255, 200, 140, 0.8),
        0 0 60px rgba(255, 180, 120, 0.4);
      animation: haloSoft 3.5s ease-in-out infinite;
    }
    @keyframes haloSoft{
      0%   { opacity: 0.2; transform: translate(-50%,-50%) scale(0.9); }
      50%  { opacity: 0.9; transform: translate(-50%,-50%) scale(1.1); }
      100% { opacity: 0.2; transform: translate(-50%,-50%) scale(0.9); }
    }

    /* ===== Video Hotspots (cinematic blue) ===== */
    .hs-video .hs-dot{
      background: rgba(120, 190, 255, 0.55);
      box-shadow:
        0 0 14px rgba(120, 190, 255, 0.9),
        0 0 34px rgba(80, 160, 255, 0.55);
      outline: 1px solid rgba(150, 210, 255, 0.75);
    }
    .hs-video .hs-halo{
      border: 1px solid rgba(150, 210, 255, 0.95);
      box-shadow:
        0 0 26px rgba(120, 190, 255, 0.95),
        0 0 60px rgba(80, 160, 255, 0.55);
      animation: haloCine 2.4s ease-in-out infinite;
    }
    @keyframes haloCine{
      0%   { opacity: 0.15; transform: translate(-50%,-50%) scale(0.85); }
      50%  { opacity: 0.95; transform: translate(-50%,-50%) scale(1.25); }
      100% { opacity: 0.15; transform: translate(-50%,-50%) scale(0.85); }
    }

    /* ===== Diary/Letter Hotspots (soft lavender) ===== */
    .hs-diary .hs-dot{
      background: rgba(205, 170, 255, 0.55);
      box-shadow:
        0 0 14px rgba(210, 180, 255, 0.85),
        0 0 34px rgba(190, 150, 255, 0.45);
      outline: 1px solid rgba(230, 210, 255, 0.7);
    }
    .hs-diary .hs-halo{
      border: 1px solid rgba(230, 210, 255, 0.9);
      box-shadow:
        0 0 22px rgba(210, 180, 255, 0.8),
        0 0 56px rgba(190, 150, 255, 0.4);
      animation: haloLav 3.0s ease-in-out infinite;
    }
    @keyframes haloLav{
      0%   { opacity: 0.18; transform: translate(-50%,-50%) scale(0.9); }
      55%  { opacity: 0.85; transform: translate(-50%,-50%) scale(1.18); }
      100% { opacity: 0.18; transform: translate(-50%,-50%) scale(0.9); }
    }

    /* ===== Constellation Mode (all art shimmer at once) ===== */
    body.constellation .hs-art{
      filter: drop-shadow(0 0 16px rgba(255, 220, 170, 0.8));
    }
    body.constellation .hs-art .hs-dot{
      animation: twinkle 1.4s ease-in-out infinite;
    }
    body.constellation .hs-art .hs-halo{
      animation: haloSoft 2.8s ease-in-out infinite, shimmer 1.6s linear infinite;
    }
    @keyframes twinkle{
      0%, 100% { opacity: 0.55; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 1;    transform: translate(-50%,-50%) scale(1.15); }
    }
    @keyframes shimmer{
      0%   { filter: brightness(1); }
      50%  { filter: brightness(1.25); }
      100% { filter: brightness(1); }
    }

    /* Popover */
    #popover{
      position: fixed;
      z-index: 20000;
      width: 380px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(18,18,22,0.92);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 80px rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      color: #fff;
      font-family: Inter, system-ui, Segoe UI, Arial, sans-serif;
      display: none;
    }
    #popHeader{
      position:relative;
      padding: 12px 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #popTitle{ font-size: 14px; font-weight: 650; margin-bottom: 6px; }
    #popMeta{ font-size: 12px; opacity: 0.72; }
    #popMedia{
      height: 240px;
      background:#0b0b0f;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor: pointer;
    }
    #popMedia img, #popMedia video{ width:100%; height:100%; object-fit:contain; }
    #popBody{ padding: 12px 12px 14px; }
    #popText{
      font-size: 13.5px;
      line-height: 1.6;
      letter-spacing: 0.2px;
      opacity: 0.92;
      white-space: pre-wrap;
      max-height: 220px;
      overflow:auto;
    }
    #popClose{
      position:absolute; right:10px; top:10px;
      width:32px; height:32px; border-radius:10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color:#fff; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      line-height: 1;
    }
  </style>
</head>
<body>

<div id="osd"></div>

<div id="popover">
  <div id="popHeader">
    <div id="popTitle">TITLE</div>
    <div id="popMeta">DATE • PLACE</div>
    <button id="popClose" aria-label="Close">✕</button>
  </div>
  <div id="popMedia"><img id="popImg" alt=""></div>
  <div id="popBody"><div id="popText">CAPTION</div></div>
</div>

<script>
  // ===== Hotspots (IMPORTANT: use backticks for text) =====
  const HOTSPOTS = [

    {
      x: 0.246433, y: 0.361053, w: 0.005848, h: 0.005848,
      tileX: 42, tileY: 61, tilesW: 1, tilesH: 1,
      title: "Sketch of Anannya",
      date: "26 Oct 2025",
      place: "Kellyville",

      type: "art"
    },

    {

      title: "Photo Story (Flipbook)",
      date: "Oct - Dec 2025",
      place: "Sydney",
      text: "Open the flipbook",
      image: "photos/thumb1.jpg",

    },

    {

      tileX: 43, tileY: 63, tilesW: 1, tilesH: 1,
      title: "125 Days (Video)",
      date: "Jan 2026",
      place: "Sydney",
      text: "Play video",
      image: "photos/thumb2.jpg",
      link: "https://drive.google.com/file/d/1jbCpECX_rSUKmljjciyboQgUGohf-14j/view?usp=sharing",
      type: "video"
    },

    {
      x: 0.252281, y: 0.378596, w: 0.005848, h: 0.005848,
      tileX: 43, tileY: 64, tilesW: 1, tilesH: 1,
      title: "Peace like Bonolatha Sen (Video)",
      date: "Nov 2025",
      place: "Sydney",
      text: "Play video",
      image: "photos/thumb3.jpg",
      link: "https://drive.google.com/file/d/1jPKitVxOo7ecJnBVBlaGRu4WYBS9gARK/view?usp=sharing",
      type: "video"
    },

    {
      x: 0.246433, y: 0.384444, w: 0.005848, h: 0.005848,
      tileX: 42, tileY: 65, tilesW: 1, tilesH: 1,
      title: "X-mas Cruise (Video)",
      date: "Dec 2025",
      place: "Sydney",
      text: "Play video",
      image: "photos/thumb4.jpg",
      link: "https://drive.google.com/file/d/1SjboR1h1CsfPi7iLww7Dqqg9QDDw1iBP/view?usp=sharing",
      type: "video"
    },

    {
      x: 0.240585, y: 0.390292, w: 0.005848, h: 0.005848,
      tileX: 41, tileY: 66, tilesW: 1, tilesH: 1,
      title: "Mallika (Video)",
      date: "Jan 2026",
      place: "Sydney",
      text: "Play video",
      image: "photos/thumb5.jpg",
      link: "https://raw.githubusercontent.com/fridayflash-ux/journal/main/mp4/Mallika.mp4",
      type: "video"
    },

    {
      x: 0.234737, y: 0.401988, w: 0.005848, h: 0.005848,
      tileX: 40, tileY: 68, tilesW: 1, tilesH: 1,
      title: "MyChery (Video)",
      date: "",
      place: "Sydney",
      text: "Play video",
      image: "photos/thumb6.jpg",
      link: "https://raw.githubusercontent.com/fridayflash-ux/journal/main/mp4/MyChery.mp4",
      type: "video"
    },

    {
      x: 0.246433, y: 0.378596, w: 0.005848, h: 0.005848,
      tileX: 42, tileY: 64, tilesW: 1, tilesH: 1,
      title: "Returning to Myself (Video)",
      date: "",
      place: "Sydney",
      text: "Play video",
      image: "photos/thumb7.jpg",
      link: "https://raw.githubusercontent.com/fridayflash-ux/journal/main/mp4/Returning%20to%20Myself.mp4",
      type: "video"
    },

    {
      x: 0.515439, y: 0.179766, w: 0.017544, h: 0.017544,
      tileX: 87, tileY: 29, tilesW: 3, tilesH: 3,
      title: "అంతరాలు దాటినా, నీవే నా వెలుగు, నా శాంతి.",
      date: "9 Dec 2025",
      place: "SYDNEY",
      text: `అంతరాలు ఎంత దూరం పెట్టినా,
నిన్ను తలచినప్పుడు హృదయం నిండే వెలుగు.
నీవే నా ప్రేరణ, నా ప్రేమ, నా శాంతి.`,
      image: "photos/a11.jpg",
      type: "diary"
    },

    {
      x: 0.357544, y: 0.179766, w: 0.005848, h: 0.005848,
      tileX: 62, tileY: 24,
      title: "THE FIRST MOVIE",
      date: "31-OCT-2025",
      place: "HOYTS WESTPOINT",
      text: `Every date of ours was unplanned — a spontaneous decision made in the moment — yet each one became something beautiful.

It was never the place that mattered to us. It was the comfort of your hand in mine, the joy of being in each other’s company and the quiet magic of looking into each other’s eyes.

Each moment leaves us wondering how blessed we are, grateful for every step of the past that led us here.

Whether it was a monthversary we celebrated or a simple catch-up that blossomed into a date, every moment has been savoured with the same warmth, the same passion and the same intensity that kept us drawing closer.`,
      image: "photos/MOVIE.jpg",
      type: "diary"
    },

    {
      x: 0.328304, y: 0.132982, w: 0.005848, h: 0.005848,
      tileX: 56, tileY: 22,
      title: "DIWALI 2025",
      date: "DATE",
      place: "PLACE",
      text: `Deepavali 2025 felt unforgettable because Anannya poured her whole heart into it.

She filled every corner with light — from the front door to the backyard deck, from the living room to my own space — turning the house into something magical.

And somewhere between the laughter and the quiet moments, I realised something simple and true:

Anannya herself is the Deepavali of my life — the light, the warmth and the hope that glows effortlessly.`,
      image: "photos/diwali1.jpg",
      type: "diary"
    }

    // ✅ keep the rest of your existing hotspots here
    // Tip: set type:"diary" for letters/diary, type:"video" for video, type:"art" for art pieces
  ];

  // ===== Popover =====
  const pop      = document.getElementById("popover");
  const popTitle = document.getElementById("popTitle");
  const popMeta  = document.getElementById("popMeta");
  const popText  = document.getElementById("popText");
  const popMedia = document.getElementById("popMedia");
  const popClose = document.getElementById("popClose");

  let closeTimer = null;
  let popLocked = false;
  let currentHotspot = null;

  function cancelClose(){ clearTimeout(closeTimer); }
  function scheduleClose(){
    clearTimeout(closeTimer);
    if (popLocked) return;
    closeTimer = setTimeout(() => pop.style.display = "none", 160);
  }

  function closePopover(){
    popLocked = false;
    currentHotspot = null;
    pop.style.display = "none";
    const v = pop.querySelector("video");
    if (v) { try { v.pause(); } catch(e){} v.src = ""; }
  }

  popClose.addEventListener("click", closePopover);
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closePopover();
    if (e.key.toLowerCase() === "c") document.body.classList.toggle("constellation"); // ✨ constellation mode
  });

  function positionPopover(evt){
    const pad = 14;
    const w = pop.offsetWidth || 380;
    const h = pop.offsetHeight || 520;
    let x = evt.clientX + pad;
    let y = evt.clientY + pad;
    if (x > window.innerWidth - w - 10) x = evt.clientX - w - pad;
    if (y > window.innerHeight - h - 10) y = evt.clientY - h - pad;
    pop.style.left = Math.max(10, x) + "px";
    pop.style.top  = Math.max(10, y) + "px";
  }

  function isVideoHotspot(h){
    if (h.type === "video") return true;
    if (h.link && /\.mp4(\?|#|$)/i.test(h.link)) return true;
    return false;
  }

  function isExternalLinkOnly(h){
    // Flipbooks / Google Drive "view" links (not direct MP4) can't be embedded reliably
    if (!h.link) return false;
    if (isVideoHotspot(h)) return false;
    return true;
  }

  function renderMediaForHotspot(h){
    const videoMode = isVideoHotspot(h);

    // Clear click handler each time
    popMedia.onclick = null;

    if (!videoMode) {
      popMedia.innerHTML = `<img id="popImg" alt="">`;
      const img = popMedia.querySelector("#popImg");
      img.src = h.image || "";
      img.alt = h.title || "";
      // If it’s a flipbook / external, click opens new tab
      if (isExternalLinkOnly(h)) {
        popMedia.onclick = () => window.open(h.link, "_blank", "noopener,noreferrer");
      }
      return;
    }

    // Video: show thumbnail first, click swaps to video (if MP4 direct), otherwise open link
    const thumb = h.image || "";
    const src = h.link || "";

    popMedia.innerHTML = `
      <div style="position:relative;width:100%;height:100%;">
        <img alt="" style="width:100%;height:100%;object-fit:contain;" src="${thumb}">
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;">
          <div style="
            width:64px;height:64px;border-radius:20px;
            background: rgba(20,35,60,0.55);
            border: 1px solid rgba(150,210,255,0.35);
            box-shadow: 0 18px 60px rgba(0,0,0,0.45);
            display:flex;align-items:center;justify-content:center;
            font-size:28px; color:#fff;
          ">▶</div>
        </div>
      </div>
    `;

    popMedia.onclick = () => {
      popLocked = true; // ✅ stick open once user clicks
      // Only embed if it's a direct mp4. Google Drive "view" won't play in <video>.
      if (!/\.mp4(\?|#|$)/i.test(src)) {
        window.open(src, "_blank", "noopener,noreferrer");
        return;
      }
      popMedia.innerHTML = `
        <video controls autoplay playsinline style="width:100%;height:100%;object-fit:contain;background:#0b0b0f">
          <source src="${src}" type="video/mp4">
        </video>
      `;
    };
  }

  function openPopover(h, evt, lock=false){
    currentHotspot = h;
    popLocked = !!lock;

    popTitle.textContent = h.title || "";
    popMeta.textContent  = [h.date, h.place].filter(Boolean).join(" • ");
    popText.textContent  = h.text || "";

    renderMediaForHotspot(h);

    pop.style.display = "block";
    positionPopover(evt);
  }

  pop.addEventListener("mouseenter", cancelClose);
  pop.addEventListener("mouseleave", scheduleClose);

  // ===== Viewer =====
  const viewer = OpenSeadragon({
    id: "osd",
    prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
    tileSources: "mosaic_4275.dzi",
    showNavigator: true,
    animationTime: 0.6,
    blendTime: 0.12,
    zoomPerScroll: 1.25,
    maxZoomPixelRatio: 2.53,
    preserveViewport: false,
    gestureSettingsMouse: { scrollToZoom:true, clickToZoom:false, dblClickToZoom:false }
  });

  function addHotspot(h){
    const wrap = document.createElement("div");
    wrap.className = "hs-wrap";

    // ✅ color/glow by type
    if (h.type === "art")   wrap.classList.add("hs-art");
    if (h.type === "video") wrap.classList.add("hs-video");
    if (h.type === "diary") wrap.classList.add("hs-diary");

    const halo = document.createElement("div");
    halo.className = "hs-halo";
    wrap.appendChild(halo);

    const dot = document.createElement("div");
    dot.className = "hs-dot";
    wrap.appendChild(dot);

    const hit = document.createElement("div");
    hit.className = "hs-hit";
    wrap.appendChild(hit);

    // Hover behavior (don’t auto-close if locked)
    hit.addEventListener("mouseenter", (e) => { cancelClose(); openPopover(h, e, false); });
    hit.addEventListener("mousemove",  (e) => { if(pop.style.display === "block") positionPopover(e); });
    hit.addEventListener("mouseleave", scheduleClose);

    // Click locks popover
    hit.addEventListener("click", (e) => {
      cancelClose();
      openPopover(h, e, true);
    });

    const rect = new OpenSeadragon.Rect(h.x - h.w/2, h.y - h.h/2, h.w, h.h);
    viewer.addOverlay({ element: wrap, location: rect });
  }

  viewer.addHandler("open", () => {
    viewer.viewport.goHome(true);
    viewer.viewport.applyConstraints(true);
    HOTSPOTS.forEach(addHotspot);
  });

  viewer.addHandler("open-failed", (e) => {
    console.error("DZI open failed:", e);
    alert("DZI open failed. Check mosaic_4275.dzi is in the same folder as index.html");
  });

  // Optional: click anywhere empty to unlock/close
  viewer.addHandler("canvas-click", (e) => {
    // If you want click on canvas to close popover, uncomment:
    // closePopover();
  });

</script>

</body>
</html>
